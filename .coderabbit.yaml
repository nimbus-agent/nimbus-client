# CodeRabbit configuration — https://docs.coderabbit.ai/configure/
# The CodeRabbit GitHub App must have access to this repository (org-level
# install on nimbus-agent, or add nimbus-client to the app's repo list).
language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!dist/**"
  path_instructions:
    - path: "src/**/*.ts"
      instructions: >-
        This is @nimbus-dev/client — the MIT-licensed, typed JSON-RPC 2.0 IPC
        client for the Nimbus gateway. Flag: any `any` (prefer `unknown` + a type
        guard); any `console.*` in non-test src (it's a published library); any
        NEW runtime dependency added to package.json (the only permitted runtime
        dep is `@nimbus-dev/sdk`, consumed as the published `^1.3.0` — inline
        helpers otherwise, never `workspace:*`); and any change to an exported
        type that isn't reflected as a semver-relevant change (Conventional
        Commits drive release-please).
chat:
  auto_reply: true
