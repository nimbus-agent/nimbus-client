name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        # Exercise both transport legs: the Unix-socket path on Linux/macOS and
        # the Windows named-pipe path on Windows.
        os: [ubuntu-24.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      # harden-runner only supports Linux runners; skip it on Windows/macOS.
      - name: Harden Runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            registry.npmjs.org:443
            nodejs.org:443
            bun.sh:443

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install
        run: bun install --frozen-lockfile

      # Build first: node-compat.test.ts imports `../dist/index.js`, so dist has
      # to exist before both Typecheck and Test. Building before Test alone used
      # to be enough, because tsconfig.test.json silently excluded every test
      # file — now that it genuinely typechecks them, Typecheck resolves that
      # import too and fails without dist. `bun run build` does not typecheck,
      # so nothing is lost by running it first.
      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test
        env:
          CI: "true"

      # Validate the bundled CJS entry that `require` consumers (the Nimbus CLI,
      # nimbus-vscode) actually load — CI otherwise only runs code under Bun.
      - name: Setup Node (CJS require smoke)
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Smoke-test the CJS bundle under Node
        run: >
          node -e "const m = require('./dist/index.cjs');
          for (const k of ['NimbusClient','MockClient','IPCClient','IpcResponseError']) {
          if (typeof m[k] === 'undefined') throw new Error('CJS export missing: ' + k); }
          console.log('CJS require OK');"

      # The require-smoke above CANNOT catch a build-machine path baked into the
      # bundle, because it runs on the machine that baked it — where the path
      # resolves. 0.7.0 shipped exactly that: a module-scope
      # `fileURLToPath(import.meta.url)` reached through the SDK root got frozen
      # to `/home/runner/work/...`, so `require("@nimbus-dev/client")` threw
      # ERR_INVALID_FILE_URL_PATH for every consumer while CI stayed green.
      # An absolute path in a published bundle is never correct; assert there is
      # none, which is machine-independent and so actually catches it.
      # Node, not a shell one-liner: this matrix includes windows-latest, where the
      # default shell is PowerShell and `if grep ...; then` is a parse error.
      - name: The bundle must not embed a build-machine path
        run: >
          node -e "const s = require('fs').readFileSync('dist/index.cjs', 'utf8');
          const hits = s.match(/file:\/\/\/[\w\-./:@%+]*/g);
          if (hits) { console.error('::error::dist/index.cjs embeds an absolute build-machine file:// URL: '
          + hits[0] + ' -- something reached import.meta.url at module scope and the bundler froze this
          machine path into the artifact.'); process.exit(1); }
          console.log('no embedded build-machine paths');"
