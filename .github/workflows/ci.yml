name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        # Exercise both transport legs: the Unix-socket path on Linux/macOS and
        # the Windows named-pipe path on Windows.
        os: [ubuntu-24.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      # harden-runner only supports Linux runners; skip it on Windows/macOS.
      - name: Harden Runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            registry.npmjs.org:443
            nodejs.org:443
            bun.sh:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install
        run: bun install --frozen-lockfile

      # Build first: node-compat.test.ts imports `../dist/index.js`, so dist has
      # to exist before both Typecheck and Test. Building before Test alone used
      # to be enough, because tsconfig.test.json silently excluded every test
      # file — now that it genuinely typechecks them, Typecheck resolves that
      # import too and fails without dist. `bun run build` does not typecheck,
      # so nothing is lost by running it first.
      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test
        env:
          CI: "true"

      # Validate the bundled CJS entry that `require` consumers (the Nimbus CLI,
      # nimbus-vscode) actually load — CI otherwise only runs code under Bun.
      - name: Setup Node (CJS require smoke)
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Smoke-test the CJS bundle under Node
        run: >
          node -e "const m = require('./dist/index.cjs');
          for (const k of ['NimbusClient','MockClient','IPCClient','IpcResponseError']) {
          if (typeof m[k] === 'undefined') throw new Error('CJS export missing: ' + k); }
          console.log('CJS require OK');"
